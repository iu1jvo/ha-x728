name: "Geekworm X728 UPS Daemon"
description: "Reads battery voltage, capacity and AC status from the Geekworm X728 UPS HAT and exposes them via a local REST API for the X728 integration."
version: "0.9.7-rc"
slug: "x728-daemon"
init: false
arch:
  - aarch64

# Hardware access
privileged:
  - SYS_RAWIO
  - DAC_OVERRIDE
devices:
  - /dev/i2c-1:/dev/i2c-1
  - /dev/gpiochip0:/dev/gpiochip0
  - /dev/gpiochip1:/dev/gpiochip1
  - /dev/gpiochip2:/dev/gpiochip2
  - /dev/gpiochip3:/dev/gpiochip3
  - /dev/gpiochip4:/dev/gpiochip4

# The integration connects here
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "X728 REST API"

# User-configurable options
options:
  hw_version: "v2.1"
  daemon_port: 8099
  poll_interval: 10
  shutdown_voltage: 3.0
  shutdown_capacity: 5
  shutdown_delay: 10
  buzzer_on_ac_loss: true

schema:
  hw_version: list(v1.x/v2.0|v2.1|v2.2|v2.3)
  daemon_port: int(1024,65535)
  poll_interval: int(5,120)
  shutdown_voltage: float(0.0,4.5)
  shutdown_capacity: int(0,50)
  shutdown_delay: int(5,120)
  buzzer_on_ac_loss: bool

image: "ghcr.io/iu1jvo/ha-addon-x728"
