name: Build & Publish Add-on

on:
  # Runs after bump-version.yml has committed the updated files and moved the tag.
  workflow_run:
    workflows: ["Bump Version Files"]
    types: [completed]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ha-addon-x728

jobs:

  resolve-tag:
    runs-on: ubuntu-latest
    # Skip if the upstream bump-version workflow failed
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

  build-and-push:
    needs: resolve-tag
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            base_image: ghcr.io/home-assistant/base-python:3.12-alpine3.22

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Set up QEMU (for cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./ha-addon-x728
          file: ./ha-addon-x728/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.base_image }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-addon-x728:${{ needs.resolve-tag.outputs.version }}-${{ matrix.arch }}
            ghcr.io/${{ github.repository_owner }}/ha-addon-x728:latest-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          labels: |
            org.opencontainers.image.title=Geekworm X728 UPS Daemon (${{ matrix.arch }})
            org.opencontainers.image.description=HA add-on daemon for the Geekworm X728 UPS HAT
            org.opencontainers.image.version=${{ needs.resolve-tag.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  create-manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build-and-push, resolve-tag]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push version manifest
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/ha-addon-x728:${{ needs.resolve-tag.outputs.version }} \
            ghcr.io/${{ github.repository_owner }}/ha-addon-x728:${{ needs.resolve-tag.outputs.version }}-aarch64

      - name: Create and push latest manifest
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/ha-addon-x728:latest \
            ghcr.io/${{ github.repository_owner }}/ha-addon-x728:latest-aarch64

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [create-manifest, resolve-tag]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" | head -20)
          else
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG"     >> $GITHUB_OUTPUT
          echo "EOF"      >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          name: "Release ${{ needs.resolve-tag.outputs.tag }}"
          body: |
            ## What's changed
            ${{ steps.changelog.outputs.log }}

            ## Docker images
            | Architecture | Image |
            |---|---|
            | aarch64 | `ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.resolve-tag.outputs.tag }}-aarch64` |
            | **multi-arch** | `ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.resolve-tag.outputs.tag }}` |
          draft: false
          prerelease: ${{ contains(needs.resolve-tag.outputs.tag, 'alpha') || contains(needs.resolve-tag.outputs.tag, 'beta') || contains(needs.resolve-tag.outputs.tag, 'rc') }}
