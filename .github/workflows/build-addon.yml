name: Build & Publish Add-on

on:
  # Runs after bump-version.yml has committed the updated files and moved the tag.
  workflow_run:
    workflows: ["Bump Version Files"]
    types: [completed]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ha-addon-x728

jobs:
  build-and-push:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    # Skip if the upstream bump-version workflow failed
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7

    steps:
      - name: Resolve tag name
        id: tag
        run: |
          # workflow_run doesn't expose GITHUB_REF_NAME for the triggering event,
          # so we read the tag from the upstream workflow's head_branch field.
          TAG="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Checkout repository at tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up QEMU (for cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./ha-addon-x728
          file: ./ha-addon-x728/Dockerfile
          platforms: linux/arm64,linux/arm/v7
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/base-python:3.13-alpine3.21
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-addon-x728:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ha-addon-x728:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          labels: |
            org.opencontainers.image.title=Geekworm X728 UPS Daemon (${{ matrix.arch }})
            org.opencontainers.image.description=HA add-on daemon for the Geekworm X728 UPS HAT
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Resolve tag name
        id: tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" | head -20)
          else
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG"     >> $GITHUB_OUTPUT
          echo "EOF"      >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          body: |
            ## What's changed
            ${{ steps.changelog.outputs.log }}

            ## Docker images
            | Architecture | Image |
            |---|---|
            | aarch64 | `ghcr.io/${{ env.IMAGE_NAME }}/aarch64:${{ steps.tag.outputs.tag }}` |
            | armv7   | `ghcr.io/${{ env.IMAGE_NAME }}/armv7:${{ steps.tag.outputs.tag }}` |
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
