name: Bump Version Files

# Runs BEFORE the build workflow.
# When you push a tag vX.Y.Z this workflow:
#   1. Updates version in custom_components/meteobridge/manifest.json
#   2. Creates a pull request with the changes
#   3. Auto-merges the PR to main

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  bump-versions:
    name: Bump version files to ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Extract version (strip leading 'v')
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Bump ha-addon-x728/config.yaml
        run: |
          python3 - <<'EOF'
          import yaml, sys, re

          path = "ha-addon-x728/config.yaml"
          version = "${{ steps.ver.outputs.version }}"

          with open(path) as f:
              content = f.read()

          old_version = None
          match = re.search(r'^version:\s*"([^"]+)"', content, re.MULTILINE)
          if match:
              old_version = match.group(1)

          new_content = re.sub(
              r'^(version:\s*)"[^"]*"',
              f'\\1"{version}"',
              content,
              flags=re.MULTILINE,
          )

          with open(path, "w") as f:
              f.write(new_content)

          print(f"config.yaml: {old_version or '?'} → {version}")
          EOF

      - name: Bump custom_components/x728/manifest.json
        run: |
          python3 - <<'EOF'
          import json

          path = "custom_components/x728/manifest.json"
          version = "${{ steps.ver.outputs.version }}"

          with open(path) as f:
              manifest = json.load(f)

          old = manifest.get("version", "?")
          manifest["version"] = version

          with open(path, "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          print(f"manifest.json: {old} → {version}")
          EOF

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ github.ref_name }}"
          title: "chore: bump version to ${{ github.ref_name }}"
          body: |
            Automatically bumped version files for release ${{ github.ref_name }}
            
            - `ha-addon-x728/config.yaml`
            - `custom_components/x728/manifest.json`
          branch: version-bump-${{ github.ref_name }}
          base: ${{ github.event.repository.default_branch }}
          delete-branch: true

      - name: Enable auto-merge for PR
        if: steps.cpr.outputs.pull-request-number
        run: |
          gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
