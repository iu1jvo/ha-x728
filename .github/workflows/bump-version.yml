name: Bump Version Files

# Runs when a tag vX.Y.Z is pushed.
# This workflow:
#   1. Bumps version in ha-addon-x728/config.yaml and custom_components/x728/manifest.json
#   2. Commits the changes
#   3. Moves the tag to point to the new commit
#   4. Creates a GitHub Release with changelog

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  bump-and-release:
    name: Bump version and create release for ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Extract version (strip leading 'v')
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Bump ha-addon-x728/config.yaml
        run: |
          python3 - <<'EOF'
          import yaml, sys, re

          path = "ha-addon-x728/config.yaml"
          version = "${{ steps.ver.outputs.version }}"

          with open(path) as f:
              content = f.read()

          old_version = None
          match = re.search(r'^version:\s*"([^"]+)"', content, re.MULTILINE)
          if match:
              old_version = match.group(1)

          new_content = re.sub(
              r'^(version:\s*)"[^"]*"',
              f'\\1"{version}"',
              content,
              flags=re.MULTILINE,
          )

          with open(path, "w") as f:
              f.write(new_content)

          print(f"config.yaml: {old_version or '?'} → {version}")
          EOF

      - name: Bump custom_components/x728/manifest.json
        run: |
          python3 - <<'EOF'
          import json

          path = "custom_components/x728/manifest.json"
          version = "${{ steps.ver.outputs.version }}"

          with open(path) as f:
              manifest = json.load(f)

          old = manifest.get("version", "?")
          manifest["version"] = version

          with open(path, "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          print(f"manifest.json: {old} → {version}")
          EOF

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add ha-addon-x728/config.yaml custom_components/x728/manifest.json
          git commit -m "chore: bump version to ${{ github.ref_name }}"

      - name: Delete local tag and move it to new commit
        run: |
          git tag -d ${{ github.ref_name }}
          git tag ${{ github.ref_name }}

      - name: Push commit and tag
        run: |
          git push origin ${{ github.event.repository.default_branch }}
          git push -f origin ${{ github.ref_name }}

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" | head -20)
          else
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG"     >> $GITHUB_OUTPUT
          echo "EOF"      >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## What's changed
            ${{ steps.changelog.outputs.log }}

            ## Installation
            Install or update via [HACS](https://hacs.xyz), oppure copia manualmente
            la cartella `custom_components/x728` nella tua installazione Home Assistant.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
