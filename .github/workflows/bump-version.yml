name: Bump Version Files

# Runs BEFORE the build workflow.
# When you push a tag vX.Y.Z this workflow:
#   1. Updates version in ha-addon-x728/config.yaml
#   2. Commits the changes back to the branch that was tagged
#   3. Moves the tag to point at the new commit

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  bump-versions:
    name: Bump version files to ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the commit and move the tag

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          # Check out the branch the tag points to, not the detached tag commit
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Extract version (strip leading 'v')
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Bump ha-addon-x728/config.yaml
        run: |
          python3 - <<'EOF'
          import yaml, sys

          path = "ha-addon-x728/config.yaml"
          version = "${{ steps.ver.outputs.version }}"

          with open(path) as f:
              cfg = yaml.safe_load(f)

          old = cfg.get("version", "?")
          cfg["version"] = version

          # Preserve file with minimal diff (dump then restore comments is not
          # possible with pure PyYAML, so we do a targeted line replacement instead)
          with open(path) as f:
              content = f.read()

          import re
          new_content = re.sub(
              r'^(version:\s*).*$',
              f'\\g<1>"{version}"',
              content,
              flags=re.MULTILINE,
          )

          with open(path, "w") as f:
              f.write(new_content)

          print(f"config.yaml: {old} → {version}")
          EOF
      - name: Commit bumped files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ha-addon-x728/config.yaml custom_components/x728/manifest.json

          # Only commit if there is actually a change
          if git diff --cached --quiet; then
            echo "No version change – skipping commit."
          else
            git commit -m "chore: bump version to ${{ github.ref_name }} [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          fi

      - name: Move tag to new commit
        run: |
          # Re-point the tag at the version-bump commit so the build
          # workflow picks up the updated files.
          git tag -f ${{ github.ref_name }}
          git push origin ${{ github.ref_name }} --force
