name: Bump Version Files

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  bump-versions:
    name: Bump version files to ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Extract version (strip leading 'v')
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Bump ha-addon-x728/config.yaml
        run: |
          python3 - <<'EOF'
          import yaml, sys

          path = "ha-addon-x728/config.yaml"
          version = "${{ steps.ver.outputs.version }}"

          with open(path) as f:
              cfg = yaml.safe_load(f)

          old = cfg.get("version", "?")
          cfg["version"] = version

          with open(path) as f:
              content = f.read()

          import re
          new_content = re.sub(
              r'^(version:\s*).*$',
              f'\\g<1>"{version}"',
              content,
              flags=re.MULTILINE,
          )

          with open(path, "w") as f:
              f.write(new_content)

          print(f"config.yaml: {old} → {version}")
          EOF

      - name: Bump custom_components/x728/manifest.json
        run: |
          python3 - <<'EOF'
          import json

          path = "custom_components/x728/manifest.json"
          version = "${{ steps.ver.outputs.version }}"

          with open(path) as f:
              manifest = json.load(f)

          old = manifest.get("version", "?")
          manifest["version"] = version

          with open(path, "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          print(f"manifest.json: {old} → {version}")
          EOF

      - name: Commit bumped files
        env:
          PAT_TOKEN: ${{ secrets.PAT_PUSH }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ha-addon-x728/config.yaml custom_components/x728/manifest.json

          if git diff --cached --quiet; then
            echo "No version change – skipping commit."
          else
            git commit -m "chore: bump version to ${{ github.ref_name }} [skip ci]"
            git push https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.event.repository.default_branch }}
          fi

      - name: Move tag to new commit
        env:
          PAT_TOKEN: ${{ secrets.PAT_PUSH }}
        run: |
          git tag -f ${{ github.ref_name }}
          git push https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git ${{ github.ref_name }} --force
